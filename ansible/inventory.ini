# Ansible Inventory File
# Defines hosts and groups for Ansible automation

# Define your EC2 instance IP or hostname here
# EDIT: Replace with your actual EC2 instance public IP or DNS name
[devops_servers]
devops_server ansible_host=13.51.70.228.compute.amazonaws.com ansible_user=ubuntu ansible_key_file=~/.ssh/my-devops-key.pem ansible_python_interpreter=/usr/bin/python3

# Grouping servers by role
[web_servers]
devops_server

[app_servers]
devops_server

[database_servers]
devops_server

# Variables for all hosts
[all:vars]
ansible_port=22
ansible_connection=ssh
env=production

# Example configuration:
# If running on local machine:
# [devops_servers]
# localhost ansible_connection=local
#
# If running on EC2 with specific settings:
# [devops_servers]
# ec2-instance-1 ansible_host=54.123.45.67 ansible_user=ubuntu ansible_key_file=~/.ssh/devops-key.pem
# ec2-instance-2 ansible_host=54.123.45.68 ansible_user=ubuntu ansible_key_file=~/.ssh/devops-key.pem
